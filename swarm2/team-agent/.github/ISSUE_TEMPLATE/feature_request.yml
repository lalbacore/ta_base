name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide details below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternative solutions have you considered?
      placeholder: I also thought about...

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Describe specific use cases for this feature
      placeholder: |
        1. As a researcher, I want to...
        2. As a developer, I need to...

  - type: checkboxes
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - label: Backend/API
        - label: Frontend/UI
        - label: Orchestrator
        - label: Specialist Agents
        - label: Capabilities
        - label: Blockchain Integration
        - label: A2A Protocol
        - label: MCP Server
        - label: Other

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low (nice to have)
        - Medium (useful improvement)
        - High (significant value add)
        - Critical (blocking important use case)
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Do you have ideas on how to implement this?
      placeholder: |
        This could be implemented by...

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Examples of similar features in other projects
      placeholder: |
        - Project X does this by...
        - Reference: https://...

  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Willing to Contribute
      description: Are you willing to help implement this feature?
      options:
        - label: I can implement this feature myself
        - label: I can help with testing
        - label: I can help with documentation
        - label: I can provide design/UX input

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
